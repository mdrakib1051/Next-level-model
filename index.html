<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voxel Architect v14.0 - Premium Edition</title>
<style>
    body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', 'Courier New', monospace; }
    
    /* Mirroring & Video Background */
    #input_video { position: absolute; width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); z-index: 1; opacity: 0.5; filter: contrast(120%) brightness(80%); }
    #three_canvas { position: absolute; top: 0; left: 0; z-index: 5; pointer-events: none; }
    #biometric_canvas { position: absolute; width: 100vw; height: 100vh; z-index: 10; transform: scaleX(-1); pointer-events: none; }

    /* Digital UI - Glassmorphism */
    #ui {
        position: absolute; top: 30px; left: 30px; z-index: 100;
        color: #00f0ff; background: rgba(0, 20, 40, 0.4);
        backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
        padding: 25px; border-radius: 15px;
        border: 1px solid rgba(0, 240, 255, 0.3);
        box-shadow: 0 0 30px rgba(0, 240, 255, 0.15);
        letter-spacing: 1px;
    }

    #ui h2 { margin: 0 0 10px 0; font-size: 16px; text-transform: uppercase; color: #fff; text-shadow: 0 0 10px #00f0ff; }
    .status-line { font-size: 11px; margin-bottom: 5px; opacity: 0.8; }
    .cmd { font-size: 10px; color: #00ffcc; margin-top: 15px; display: grid; gap: 5px; }
    
    /* Digital Scanning Line Effect */
    .scanline {
        position: absolute; top: 0; left: 0; width: 100%; height: 2px;
        background: rgba(0, 240, 255, 0.2);
        box-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        animation: scanning 4s linear infinite; z-index: 2;
    }
    @keyframes scanning { 0% { top: 0; } 100% { top: 100%; } }

    hr { border: 0; border-top: 1px solid rgba(0,240,255,0.2); margin: 15px 0; }
</style>
</head>
<body>
<div class="scanline"></div>
<div id="ui">
    <h2>Voxel Architect <span style="font-size: 10px; vertical-align: middle;">v14.0</span></h2>
    <div class="status-line">SYSTEM: <span id="mode" style="color: #fff;">READY</span></div>
    <div class="status-line">MEMORY_USE: <span id="count" style="color: #fff;">0</span> UNITS</div>
    <hr>
    <div class="cmd">
        <span>👌 <b style="color:#fff">RIGHT PINCH:</b> BUILD VOXEL</span>
        <span>✋✋ <b style="color:#fff">2 PALMS:</b> MOVE STRUCTURE</span>
        <span>✊✊ <b style="color:#fff">2 FISTS:</b> SCALE/ZOOM</span>
        <span>✌️ <b style="color:#fff">L-PEACE:</b> CHANGE SPECTRUM</span>
        <span>☝️👌 <b style="color:#fff">L-POINT + R-PINCH:</b> DELETE</span>
    </div>
</div>

<video id="input_video" autoplay playsinline></video>
<canvas id="three_canvas"></canvas>
<canvas id="biometric_canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const videoElement = document.getElementById('input_video');
const bioCanvas = document.getElementById('biometric_canvas');
const bioCtx = bioCanvas.getContext('2d');
const countEl = document.getElementById('count');

// --- THREE.JS PREMIUM ENGINE ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three_canvas'), antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

const voxelGroup = new THREE.Group();
scene.add(voxelGroup);
const currentSketch = new THREE.Group();
voxelGroup.add(currentSketch);

// Digital Grid Floor
const gridHelper = new THREE.GridHelper(60, 40, 0x00f0ff, 0x002233);
gridHelper.position.y = -10;
gridHelper.material.transparent = true;
gridHelper.material.opacity = 0.3;
scene.add(gridHelper);

const gridSize = 1.2;
const placedVoxels = new Map();
const crosshair = new THREE.Mesh(
    new THREE.BoxGeometry(gridSize, gridSize, gridSize),
    new THREE.MeshBasicMaterial({ color: 0x00f0ff, wireframe: true, transparent: true, opacity: 0.6 })
);
scene.add(crosshair);

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.4));
const pointLight = new THREE.PointLight(0x00f0ff, 1.5);
pointLight.position.set(10, 10, 10);
scene.add(pointLight);

camera.position.z = 35;

// --- STATE & UTILS ---
let initialHandDist = null, initialVoxelScale = 1;
let initialMidpoint = null, initialGroupPos = null;
let globalColorIndex = 0, leftPeaceWasActive = false;
const colorPalette = [0x00f0ff, 0x00ffcc, 0xff0055, 0x9900ff, 0xffff00, 0xff8800];
let isBuilding = false, buildTimer = 0, eraseTimer = 0;
let sketchKeys = new Set();
const pinchThresh = 0.04;

function getDist(p1, p2) { return Math.sqrt(Math.pow(p1.x-p2.x,2)+Math.pow(p1.y-p2.y,2)); }

function onResults(results) {
    bioCtx.clearRect(0, 0, bioCanvas.width, bioCanvas.height);
    crosshair.visible = false;
    if (!results.multiHandLandmarks) return;

    let hands = {};
    results.multiHandedness.forEach((hand, idx) => {
        const landmarks = results.multiHandLandmarks[idx];
        drawCyberHand(bioCtx, landmarks);
        hands[hand.label] = landmarks;
    });

    const l = hands['Left'], r = hands['Right'];

    // Move & Zoom Logic
    if (l && r) {
        const lFist = l[8].y > l[6].y && l[12].y > l[10].y && l[16].y > l[14].y;
        const rFist = r[8].y > r[6].y && r[12].y > r[10].y && r[16].y > r[14].y;
        const lOpen = l[8].y < l[6].y && l[12].y < l[10].y;
        const rOpen = r[8].y < r[6].y && r[12].y < r[10].y;

        if (lFist && rFist) {
            const d = getDist(l[9], r[9]);
            if (initialHandDist === null) { initialHandDist = d; initialVoxelScale = voxelGroup.scale.x; }
            else { 
                let s = (d / initialHandDist) * initialVoxelScale;
                voxelGroup.scale.set(s, s, s);
            }
            return;
        } else initialHandDist = null;

        if (lOpen && rOpen && !lFist && !rFist) {
            const mid = { x: (l[9].x + r[9].x)/2, y: (l[9].y + r[9].y)/2 };
            if (initialMidpoint === null) { initialMidpoint = mid; initialGroupPos = voxelGroup.position.clone(); }
            else {
                voxelGroup.position.x = initialGroupPos.x + (initialMidpoint.x - mid.x) * 45;
                voxelGroup.position.y = initialGroupPos.y + (initialMidpoint.y - mid.y) * 35;
            }
            return;
        } else initialMidpoint = null;
    }

    // Build & Erase Logic
    if (r) {
        const worldPos = new THREE.Vector3((0.5 - r[8].x) * 35, (0.5 - r[8].y) * 25, 0);
        const localPos = voxelGroup.worldToLocal(worldPos.clone());
        let gx = Math.round(localPos.x / gridSize) * gridSize;
        let gy = Math.round(localPos.y / gridSize) * gridSize;

        const rPinch = getDist(r[4], r[8]) < pinchThresh;
        const lPoint = l && l[8].y < l[6].y && l[12].y > l[10].y;

        if (lPoint && rPinch) {
            eraseTimer += 16;
            if (eraseTimer >= 400) {
                const key = `${gx.toFixed(1)},${gy.toFixed(1)},0.0`;
                if (placedVoxels.has(key)) { voxelGroup.remove(placedVoxels.get(key)); placedVoxels.delete(key); }
            }
        } else if (rPinch) {
            buildTimer += 16;
            if (buildTimer >= 300) {
                if (!isBuilding) { isBuilding = true; sketchKeys.clear(); }
                addSketchVoxel(gx, gy, 0);
            }
        } else {
            if (isBuilding) commitVoxels();
            isBuilding = false; buildTimer = 0; eraseTimer = 0;
        }

        if (rPinch) {
            crosshair.visible = true;
            crosshair.position.copy(voxelGroup.localToWorld(new THREE.Vector3(gx, gy, 0)));
            crosshair.material.color.set(lPoint ? 0xff0000 : colorPalette[globalColorIndex]);
        }
    }

    if (l) {
        const isPeace = l[8].y < l[6].y && l[12].y < l[10].y && l[16].y > l[14].y;
        if (isPeace && !leftPeaceWasActive) { globalColorIndex = (globalColorIndex + 1) % colorPalette.length; leftPeaceWasActive = true; }
        else if (!isPeace) leftPeaceWasActive = false;
    }
    countEl.innerText = placedVoxels.size;
}

function drawCyberHand(ctx, l) {
    ctx.strokeStyle = "rgba(0, 240, 255, 0.4)"; ctx.lineWidth = 1.5;
    [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[9,10],[10,11],[11,12],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]].forEach(([a,b])=>{
        ctx.beginPath(); ctx.moveTo(l[a].x*bioCanvas.width, l[a].y*bioCanvas.height); ctx.lineTo(l[b].x*bioCanvas.width, l[b].y*bioCanvas.height); ctx.stroke();
    });
}

function addSketchVoxel(x, y, z) {
    const key = `${x.toFixed(1)},${y.toFixed(1)},${z.toFixed(1)}`;
    if (sketchKeys.has(key) || placedVoxels.has(key)) return;
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(gridSize, gridSize, gridSize), new THREE.MeshBasicMaterial({ color: colorPalette[globalColorIndex], wireframe: true }));
    mesh.position.set(x, y, z);
    currentSketch.add(mesh);
    sketchKeys.add(key);
}

function commitVoxels() {
    while(currentSketch.children.length > 0) {
        const f = currentSketch.children[0];
        const cube = createFinalCube(f.position.x, f.position.y, f.position.z);
        voxelGroup.add(cube);
        placedVoxels.set(`${f.position.x.toFixed(1)},${f.position.y.toFixed(1)},0.0`, cube);
        currentSketch.remove(f);
    }
}

function createFinalCube(x, y, z) {
    const g = new THREE.BoxGeometry(gridSize*0.92, gridSize*0.92, gridSize*0.92);
    // Premium Material with Emissive Glow
    const m = new THREE.MeshPhongMaterial({ 
        color: 0x00050a, 
        emissive: colorPalette[globalColorIndex], 
        emissiveIntensity: 0.8,
        shininess: 100,
        transparent: true,
        opacity: 0.9
    });
    const mesh = new THREE.Mesh(g, m);
    mesh.position.set(x, y, z);
    
    // Add glowing edges
    const edges = new THREE.EdgesGeometry(g);
    const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: colorPalette[globalColorIndex], linewidth: 2 }));
    mesh.add(line);
    
    return mesh;
}

const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
hands.onResults(onResults);
new Camera(videoElement, { onFrame: async () => { bioCanvas.width = videoElement.videoWidth; bioCanvas.height = videoElement.videoHeight; await hands.send({image: videoElement}); }, width: 1280, height: 720 }).start();

function animate() { 
    requestAnimationFrame(animate); 
    // Subtle rotation of the floor for dynamic effect
    gridHelper.rotation.y += 0.001;
    renderer.render(scene, camera); 
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
