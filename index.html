<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voxel Architect v11.5 - Rotation Fixed</title>
<style>
body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
#input_video { position: absolute; width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); z-index: 1; opacity: 0.65; }
#three_canvas { position: absolute; top: 0; left: 0; z-index: 5; pointer-events: none; }
#biometric_canvas { position: absolute; width: 100vw; height: 100vh; z-index: 10; transform: scaleX(-1); pointer-events: none; }
#ui {
position: absolute; top: 20px; left: 20px; z-index: 100;
color: #00f0ff; font-weight: bold; font-size: 13px;
text-shadow: 0 0 10px #00f0ff; border-left: 3px solid #00f0ff; padding-left: 15px;
background: rgba(0,0,0,0.7); padding: 15px; border-radius: 0 10px 10px 0;
}
.stat-val { color: #fff; }
</style>
</head>
<body>
<div id="ui">
<div>BIO_SYNC: ARCHITECT_OS_v11.5</div>
<div>STATE: <span id="mode" class="stat-val">INITIALIZING</span></div>
<div>VOXELS: <span id="count" class="stat-val">0</span></div>
<hr style="border:0; border-top:1px solid rgba(0,240,255,0.3); margin:10px 0;">
<div style="font-size: 9px; color: #ff3333;">2 FISTS: RESET | 2 PALMS: ROTATE</div>
<div style="font-size: 9px; color: #ff00ff;">L-THUMB DOWN: BURST | UP: RESTORE</div>
<div style="font-size: 9px; color: #00ff00;">L-PEACE: COLOR | R-PEACE: DISCO</div>
<div style="font-size: 9px; color: #00f0ff;">L-PINCH + R-POINT: ERASE | R-PINCH: BUILD</div>
</div>

<video id="input_video" autoplay playsinline></video>
<canvas id="three_canvas"></canvas>
<canvas id="biometric_canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const videoElement = document.getElementById('input_video');
const bioCanvas = document.getElementById('biometric_canvas');
const bioCtx = bioCanvas.getContext('2d');
const modeEl = document.getElementById('mode');
const countEl = document.getElementById('count');

// --- THREE.JS ENGINE ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three_canvas'), antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);

const voxelGroup = new THREE.Group();
scene.add(voxelGroup);
const currentSketch = new THREE.Group();
voxelGroup.add(currentSketch);

const gridSize = 1.2;
const placedVoxels = new Map();
const crosshair = new THREE.Mesh(
    new THREE.BoxGeometry(gridSize, gridSize, gridSize),
    new THREE.MeshBasicMaterial({ color: 0x00f0ff, wireframe: true, transparent: true, opacity: 0.5 })
);
scene.add(crosshair);

scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const sun = new THREE.DirectionalLight(0xffffff, 1.0);
sun.position.set(5, 5, 5);
scene.add(sun);
camera.position.z = 25;

// --- STATE & TIMERS ---
let gravityEnabled = false;
let rainbowActive = false;
let gravityTimer = 0, restoreTimer = 0, resetTimer = 0, rotateTimer = 0;
let buildTimer = 0, eraseTimer = 0;
const GRAVITY_HOLD = 800, RESET_HOLD = 1000, ROTATE_HOLD = 600, INTENT_HOLD = 500;

let globalColorIndex = 0;
let leftPeaceWasActive = false;
const colorPalette = [0x00f0ff, 0xff3366, 0x00ffcc, 0xffcc00, 0xaa00ff, 0xffffff, 0x00ff00];
const pinchThreshold = 0.05;

let isBuilding = false;
let sketchKeys = new Set();

// --- UI RENDERING ---
function drawCyberHand(ctx, landmarks) {
    ctx.strokeStyle = "rgba(0, 240, 255, 0.4)";
    ctx.lineWidth = 2;
    const CONNECTIONS = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[9,10],[10,11],[11,12],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];
    CONNECTIONS.forEach(([a, b]) => {
        ctx.beginPath();
        ctx.moveTo(landmarks[a].x * bioCanvas.width, landmarks[a].y * bioCanvas.height);
        ctx.lineTo(landmarks[b].x * bioCanvas.width, landmarks[b].y * bioCanvas.height);
        ctx.stroke();
    });
    landmarks.forEach((pt, i) => {
        ctx.fillStyle = [4, 8, 12, 16, 20].includes(i) ? "#fff" : "#00f0ff";
        ctx.beginPath();
        ctx.arc(pt.x * bioCanvas.width, pt.y * bioCanvas.height, 3, 0, Math.PI*2);
        ctx.fill();
    });
}

function drawHUDCircle(ctx, x, y, progress, color) {
    ctx.beginPath();
    ctx.arc(x, y, 40, -Math.PI/2, (-Math.PI/2) + (Math.PI * 2 * progress));
    ctx.lineWidth = 6; ctx.strokeStyle = color; ctx.stroke();
}

function getDist(p1, p2) { return Math.sqrt(Math.pow(p1.x-p2.x,2)+Math.pow(p1.y-p2.y,2)); }

// --- AI CORE RESULTS ---
function onResults(results) {
    bioCtx.clearRect(0, 0, bioCanvas.width, bioCanvas.height);
    crosshair.visible = false;
    if (!results.multiHandLandmarks) return;

    let lHand = null, rHand = null;
    results.multiHandedness.forEach((hand, idx) => {
        const lm = results.multiHandLandmarks[idx];
        drawCyberHand(bioCtx, lm);
        if(hand.label === 'Left') lHand = lm;
        else rHand = lm;
    });

    // 1. GLOBAL COMMANDS (2 HANDS)
    if (lHand && rHand) {
        const lFist = lHand[8].y > lHand[6].y && lHand[12].y > lHand[10].y;
        const rFist = rHand[8].y > rHand[6].y && rHand[12].y > rHand[10].y;
        const lPalm = lHand[8].y < lHand[6].y && lHand[12].y < lHand[10].y;
        const rPalm = rHand[8].y < rHand[6].y && rHand[12].y < rHand[10].y;

        if (lFist && rFist) {
            resetTimer += 16;
            drawHUDCircle(bioCtx, bioCanvas.width/2, bioCanvas.height/2, resetTimer/RESET_HOLD, "#ff0055");
            if (resetTimer >= RESET_HOLD) { voxelGroup.position.set(0,0,0); voxelGroup.rotation.set(0,0,0); modeEl.innerText="RESET DONE"; }
            return;
        } else resetTimer = 0;

        if (lPalm && rPalm) {
            rotateTimer += 16;
            drawHUDCircle(bioCtx, bioCanvas.width/2, bioCanvas.height/2, Math.min(rotateTimer/ROTATE_HOLD, 1), "#00f0ff");
            if (rotateTimer >= ROTATE_HOLD) {
                modeEl.innerText = "ROTATING";
                voxelGroup.rotation.y += (rHand[0].x - lHand[0].x - 0.5) * 0.12;
                voxelGroup.rotation.x += (rHand[0].y + lHand[0].y - 1.0) * 0.12;
            }
            return;
        } else rotateTimer = 0;
    }

    // 2. LEFT HAND (GRAVITY & COLOR)
    if (lHand) {
        const curled = lHand[8].y > lHand[6].y && lHand[12].y > lHand[10].y;
        const isPeace = lHand[8].y < lHand[6].y && lHand[12].y < lHand[10].y && lHand[16].y > lHand[14].y;
        
        if (isPeace && !leftPeaceWasActive) { globalColorIndex = (globalColorIndex + 1) % colorPalette.length; leftPeaceWasActive = true; }
        else if (!isPeace) leftPeaceWasActive = false;

        if (lHand[4].y > lHand[3].y && curled) { // Thumb Down
            gravityTimer += 16;
            drawHUDCircle(bioCtx, lHand[4].x*bioCanvas.width, lHand[4].y*bioCanvas.height, gravityTimer/GRAVITY_HOLD, "#ff00ff");
            if (gravityTimer >= GRAVITY_HOLD) { gravityEnabled = true; initiateGravityFall(); }
        } else gravityTimer = 0;

        if (lHand[4].y < lHand[3].y && curled) { // Thumb Up
            restoreTimer += 16;
            drawHUDCircle(bioCtx, lHand[4].x*bioCanvas.width, lHand[4].y*bioCanvas.height, restoreTimer/GRAVITY_HOLD, "#00ff88");
            if (restoreTimer >= GRAVITY_HOLD) gravityEnabled = false;
        } else restoreTimer = 0;
    }

    // 3. RIGHT HAND (BUILD, ERASE, DISCO)
    if (rHand) {
        const isPeace = rHand[8].y < rHand[6].y && rHand[12].y < rHand[10].y && rHand[16].y > rHand[14].y;
        rainbowActive = isPeace;

        const worldPos = new THREE.Vector3((0.5 - rHand[8].x) * 28, (0.5 - rHand[8].y) * 20, 0);
        const localPos = voxelGroup.worldToLocal(worldPos.clone());
        let gx = Math.round(localPos.x / gridSize) * gridSize;
        let gy = Math.round(localPos.y / gridSize) * gridSize;

        const isPinching = getDist(rHand[4], rHand[8]) < pinchThreshold;
        const lPinching = lHand && getDist(lHand[4], lHand[8]) < pinchThreshold;

        if (lPinching) { // Erase Mode
            eraseTimer += 16;
            drawHUDCircle(bioCtx, rHand[8].x*bioCanvas.width, rHand[8].y*bioCanvas.height, eraseTimer/INTENT_HOLD, "#ff3333");
            if (eraseTimer >= INTENT_HOLD) {
                const key = `${gx.toFixed(1)},${gy.toFixed(1)},0.0`;
                if (placedVoxels.has(key)) { voxelGroup.remove(placedVoxels.get(key)); placedVoxels.delete(key); }
            }
        } else if (isPinching) { // Build Mode
            buildTimer += 16;
            drawHUDCircle(bioCtx, rHand[8].x*bioCanvas.width, rHand[8].y*bioCanvas.height, buildTimer/INTENT_HOLD, "#00ffcc");
            if (buildTimer >= INTENT_HOLD) {
                if (!isBuilding) { isBuilding = true; sketchKeys.clear(); }
                addSketchVoxel(gx, gy, 0);
            }
        } else {
            if (isBuilding) commitVoxels();
            isBuilding = false; buildTimer = 0; eraseTimer = 0;
            modeEl.innerText = "IDLE";
        }

        if (isBuilding || buildTimer > 0 || eraseTimer > 0) {
            crosshair.visible = true;
            crosshair.position.copy(voxelGroup.localToWorld(new THREE.Vector3(gx, gy, 0)));
            crosshair.material.color.set(eraseTimer > 0 ? 0xff3333 : colorPalette[globalColorIndex]);
        }
    }
    countEl.innerText = placedVoxels.size;
}

function initiateGravityFall() {
    placedVoxels.forEach(v => { v.velocity.set((Math.random()-0.5)*1.2, 0.5+Math.random()*0.5, (Math.random()-0.5)*1.2); });
}

function addSketchVoxel(x, y, z) {
    const key = `${x.toFixed(1)},${y.toFixed(1)},${z.toFixed(1)}`;
    if (sketchKeys.has(key) || placedVoxels.has(key)) return;
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(gridSize, gridSize, gridSize), new THREE.MeshBasicMaterial({ color: colorPalette[globalColorIndex], wireframe: true }));
    mesh.position.set(x, y, z);
    currentSketch.add(mesh);
    sketchKeys.add(key);
}

function commitVoxels() {
    while(currentSketch.children.length > 0) {
        const f = currentSketch.children[0];
        const cube = createFinalCube(f.position.x, f.position.y, f.position.z);
        voxelGroup.add(cube);
        placedVoxels.set(`${f.position.x.toFixed(1)},${f.position.y.toFixed(1)},0.0`, cube);
        currentSketch.remove(f);
    }
}

function createFinalCube(x, y, z) {
    const g = new THREE.BoxGeometry(gridSize*0.96, gridSize*0.96, gridSize*0.96);
    const m = new THREE.MeshPhongMaterial({ color: 0x001122, emissive: colorPalette[globalColorIndex], emissiveIntensity: 0.5, transparent: true, opacity: 0.85 });
    const mesh = new THREE.Mesh(g, m);
    mesh.position.set(x, y, z);
    mesh.origin = new THREE.Vector3(x, y, z);
    mesh.velocity = new THREE.Vector3(0,0,0);
    mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(g), new THREE.LineBasicMaterial({ color: colorPalette[globalColorIndex] })));
    return mesh;
}

const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });
hands.onResults(onResults);
new Camera(videoElement, { onFrame: async () => { 
    bioCanvas.width = videoElement.videoWidth; bioCanvas.height = videoElement.videoHeight; 
    await hands.send({image: videoElement}); 
}, width: 1280, height: 720 }).start();

function animate() {
    requestAnimationFrame(animate);
    if (rainbowActive) {
        placedVoxels.forEach(v => { v.material.emissive.setHSL(Math.random(), 1, 0.5); v.material.emissiveIntensity = 2; });
    } else {
        placedVoxels.forEach(v => { v.material.emissive.setHex(colorPalette[globalColorIndex]); v.material.emissiveIntensity = 0.5; });
    }
    placedVoxels.forEach((v) => {
        if (gravityEnabled) {
            v.velocity.y -= 0.03;
            v.position.add(v.velocity);
            if (v.position.y < -12) { v.position.y = -12; v.velocity.y *= -0.25; v.velocity.x *= 0.9; }
        } else { v.position.lerp(v.origin, 0.12); v.velocity.set(0,0,0); }
    });
    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
