<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Voxel Architect - Cyber Scan Edition</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #input_video { position: absolute; width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); z-index: 1; opacity: 0.8; }
        #three_canvas { position: absolute; top: 0; left: 0; z-index: 5; pointer-events: none; }
        #biometric_canvas { position: absolute; width: 100vw; height: 100vh; z-index: 10; transform: scaleX(-1); pointer-events: none; }
        
        /* Scanning Grid Effect */
        #scanner_overlay {
            position: absolute; width: 100vw; height: 100vh; z-index: 2;
            background: linear-gradient(rgba(0, 240, 255, 0.1) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0, 240, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        #ui { 
            position: absolute; top: 30px; left: 30px; z-index: 100;
            color: #00f0ff; font-weight: bold; letter-spacing: 2px;
            text-shadow: 0 0 10px #00f0ff;
            background: rgba(0,0,0,0.7); padding: 20px; border-radius: 5px; border: 1px solid #00f0ff;
        }
    </style>
</head>
<body>
    <div id="scanner_overlay"></div>
    <div id="ui">
        <div>SYSTEM: ARCHITECT_SCANNER_v6.0</div>
        <div>MODE: <span id="mode" style="color:#fff">READY</span></div>
        <div>BLOCKS: <span id="count" style="color:#fff">0</span></div>
        <div style="font-size: 10px; margin-top: 10px; color: #ff3333;">L-FIST + R-PINCH = ERASE</div>
    </div>

    <video id="input_video" autoplay playsinline></video>
    <canvas id="three_canvas"></canvas>
    <canvas id="biometric_canvas"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const videoElement = document.getElementById('input_video');
        const bioCanvas = document.getElementById('biometric_canvas');
        const bioCtx = bioCanvas.getContext('2d');
        const modeEl = document.getElementById('mode');
        const countEl = document.getElementById('count');

        // Scene Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three_canvas'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const voxelGroup = new THREE.Group();
        scene.add(voxelGroup);

        const gridSize = 1.2;
        const placedVoxels = new Map();
        camera.position.z = 25;

        // Lighting for "Glassy" effect
        const ambient = new THREE.AmbientLight(0x00f0ff, 0.3);
        scene.add(ambient);
        const pointLight = new THREE.PointLight(0xffffff, 1);
        pointLight.position.set(10, 10, 10);
        scene.add(pointLight);

        function createVoxel(x, y, z) {
            const geo = new THREE.BoxGeometry(gridSize*0.9, gridSize*0.9, gridSize*0.9);
            // Glassy material like the video
            const mat = new THREE.MeshPhongMaterial({ 
                color: 0x00f0ff, transparent: true, opacity: 0.4, 
                shininess: 100, emissive: 0x00f0ff, emissiveIntensity: 0.2 
            });
            const mesh = new THREE.Mesh(geo, mat);
            
            // Neon border/edges
            const edges = new THREE.EdgesGeometry(geo);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x00f0ff }));
            mesh.add(line);
            
            mesh.position.set(x, y, z);
            return mesh;
        }

        function onResults(results) {
            bioCtx.clearRect(0, 0, bioCanvas.width, bioCanvas.height);
            let lHand = null, rHand = null;

            if (results.multiHandLandmarks) {
                results.multiHandedness.forEach((hand, i) => {
                    if(hand.label === 'Left') lHand = results.multiHandLandmarks[i];
                    if(hand.label === 'Right') rHand = results.multiHandLandmarks[i];
                });
            }

            if (rHand) {
                const index = rHand[8];
                const thumb = rHand[4];
                const isPinching = Math.hypot(index.x - thumb.x, index.y - thumb.y) < 0.05;
                
                // Z-depth calculation
                const gx = Math.round(((0.5 - index.x) * 35) / gridSize) * gridSize;
                const gy = Math.round(((0.5 - index.y) * 25) / gridSize) * gridSize;
                const gz = Math.round((-index.z * 20) / gridSize) * gridSize;
                const key = `${gx},${gy},${gz}`;

                // Erase Logic: If Left Fist is active
                const isLeftFist = lHand && lHand[8].y > lHand[6].y && lHand[12].y > lHand[10].y;

                if (isPinching) {
                    if (isLeftFist) {
                        // REMOVE MODE
                        if (placedVoxels.has(key)) {
                            voxelGroup.remove(placedVoxels.get(key));
                            placedVoxels.delete(key);
                            modeEl.innerText = "ERASING...";
                        }
                    } else {
                        // BUILD MODE
                        if (!placedVoxels.has(key)) {
                            const v = createVoxel(gx, gy, gz);
                            voxelGroup.add(v);
                            placedVoxels.set(key, v);
                            modeEl.innerText = "CONSTRUCTING";
                        }
                    }
                } else {
                    modeEl.innerText = isLeftFist ? "ERASER READY" : "SCANNING";
                }
                countEl.innerText = placedVoxels.size;
            }
        }

        const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.8 });
        hands.onResults(onResults);
        
        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                bioCanvas.width = videoElement.videoWidth;
                bioCanvas.height = videoElement.videoHeight;
                await hands.send({image: videoElement});
            },
            width: 1280, height: 720
        });
        cameraUtils.start();

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
