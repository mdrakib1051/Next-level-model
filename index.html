<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Voxel Architect - Absolute Fix v9.0</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #input_video { position: absolute; width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); z-index: 1; }
        #three_canvas { position: absolute; top: 0; left: 0; z-index: 5; pointer-events: none; }
        #biometric_canvas { position: absolute; width: 100vw; height: 100vh; z-index: 10; transform: scaleX(-1); pointer-events: none; }
        #ui { 
            position: absolute; top: 20px; left: 20px; z-index: 100;
            color: #00f0ff; background: rgba(0,0,0,0.8); padding: 15px;
            border-left: 4px solid #00f0ff; text-shadow: 0 0 5px #00f0ff;
        }
        #loading_msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #00f0ff; z-index: 1000; font-size: 20px; }
    </style>
</head>
<body>
    <div id="loading_msg">LOADING AI MODELS... PLEASE WAIT</div>
    <div id="ui">
        <div>SYSTEM: Voxel_OS_v9.0</div>
        <div>STATE: <span id="mode" style="color:white">STARTING...</span></div>
        <div>BLOCKS: <span id="count" style="color:white">0</span></div>
    </div>

    <video id="input_video" autoplay playsinline></video>
    <canvas id="three_canvas"></canvas>
    <canvas id="biometric_canvas"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const videoElement = document.getElementById('input_video');
        const bioCanvas = document.getElementById('biometric_canvas');
        const bioCtx = bioCanvas.getContext('2d');
        const modeEl = document.getElementById('mode');
        const countEl = document.getElementById('count');
        const loadingMsg = document.getElementById('loading_msg');

        // 1. Three.js Engine
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three_canvas'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.position.z = 25;

        const voxelGroup = new THREE.Group();
        scene.add(voxelGroup);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));

        const placedVoxels = new Map();
        let gravityEnabled = false;

        // 2. Hand Drawing (Landmarks)
        function drawHand(landmarks) {
            bioCtx.strokeStyle = "#00f0ff";
            bioCtx.lineWidth = 3;
            const connections = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[9,10],[10,11],[11,12],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];
            connections.forEach(([a, b]) => {
                bioCtx.beginPath();
                bioCtx.moveTo(landmarks[a].x * bioCanvas.width, landmarks[a].y * bioCanvas.height);
                bioCtx.lineTo(landmarks[b].x * bioCanvas.width, landmarks[b].y * bioCanvas.height);
                bioCtx.stroke();
            });
            landmarks.forEach(p => {
                bioCtx.fillStyle = "#fff";
                bioCtx.beginPath(); bioCtx.arc(p.x * bioCanvas.width, p.y * bioCanvas.height, 4, 0, Math.PI*2); bioCtx.fill();
            });
        }

        // 3. Voxel Creation
        function createVoxel(x, y, z) {
            const geo = new THREE.BoxGeometry(1.1, 1.1, 1.1);
            const mat = new THREE.MeshPhongMaterial({ color: 0x00f0ff, transparent: true, opacity: 0.6, emissive: 0x00f0ff, emissiveIntensity: 0.3 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo), new THREE.LineBasicMaterial({ color: 0x00f0ff })));
            mesh.position.set(x, y, z);
            mesh.origin = new THREE.Vector3(x, y, z);
            mesh.velocity = new THREE.Vector3(0,0,0);
            return mesh;
        }

        // 4. Main AI Results
        function onResults(results) {
            loadingMsg.style.display = 'none';
            bioCtx.clearRect(0, 0, bioCanvas.width, bioCanvas.height);
            if (!results.multiHandLandmarks) { modeEl.innerText = "SEARCHING..."; return; }

            let lHand = null, rHand = null;
            results.multiHandedness.forEach((hand, i) => {
                const lm = results.multiHandLandmarks[i];
                drawHand(lm);
                if(hand.label === 'Left') lHand = lm;
                else rHand = lm;
            });

            if (rHand) {
                const gx = Math.round(((0.5 - rHand[8].x) * 35) / 1.2) * 1.2;
                const gy = Math.round(((0.5 - rHand[8].y) * 25) / 1.2) * 1.2;
                const gz = Math.round((-rHand[8].z * 20) / 1.2) * 1.2;
                const key = `${gx},${gy},${gz}`;

                const pinching = Math.hypot(rHand[8].x - rHand[4].x, rHand[8].y - rHand[4].y) < 0.05;
                const eraseMode = lHand && lHand[8].y > lHand[6].y && lHand[12].y > lHand[10].y;

                if (pinching) {
                    if (eraseMode) {
                        if (placedVoxels.has(key)) { voxelGroup.remove(placedVoxels.get(key)); placedVoxels.delete(key); }
                        modeEl.innerText = "ERASING";
                    } else if (!placedVoxels.has(key)) {
                        const v = createVoxel(gx, gy, gz);
                        voxelGroup.add(v); placedVoxels.set(key, v);
                        modeEl.innerText = "BUILDING";
                    }
                } else { modeEl.innerText = eraseMode ? "ERASER ACTIVE" : "SCANNING"; }
            }
            countEl.innerText = placedVoxels.size;
        }

        // 5. Initialize MediaPipe
        const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.75, minTrackingConfidence: 0.75 });
        hands.onResults(onResults);

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                bioCanvas.width = videoElement.videoWidth;
                bioCanvas.height = videoElement.videoHeight;
                await hands.send({image: videoElement});
            },
            width: 1280, height: 720
        });
        cameraUtils.start();

        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
