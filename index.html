<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voxel Architect v13.0 - Fixed Gestures</title>
<style>
body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
#input_video { position: absolute; width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); z-index: 1; opacity: 0.6; }
#three_canvas { position: absolute; top: 0; left: 0; z-index: 5; pointer-events: none; }
#biometric_canvas { position: absolute; width: 100vw; height: 100vh; z-index: 10; transform: scaleX(-1); pointer-events: none; }
#ui {
position: absolute; top: 20px; left: 20px; z-index: 100;
color: #00f0ff; font-weight: bold; font-size: 13px;
text-shadow: 0 0 10px #00f0ff; border-left: 3px solid #00f0ff; padding-left: 15px;
background: rgba(0,0,0,0.8); padding: 15px; border-radius: 0 10px 10px 0;
}
</style>
</head>
<body>
<div id="ui">
<div>CORE_SYNC: ARCHITECT_v13.0</div>
<hr style="border:0; border-top:1px solid #00f0ff; margin:10px 0;">
<div style="color: #00ffcc;">👌 RIGHT PINCH: BUILD</div>
<div style="color: #ffcc00;">✋✋ 2 PALMS: MOVE GROUP</div>
<div style="color: #ff00ff;">✊✊ 2 FISTS: ZOOM (Move apart/closer)</div>
<div style="color: #00ff00;">✌️ LEFT PEACE: COLOR</div>
<div style="color: #ff3333;">☝️(L) + 👌(R): ERASE</div>
</div>

<video id="input_video" autoplay playsinline></video>
<canvas id="three_canvas"></canvas>
<canvas id="biometric_canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const videoElement = document.getElementById('input_video');
const bioCanvas = document.getElementById('biometric_canvas');
const bioCtx = bioCanvas.getContext('2d');

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three_canvas'), antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);

const voxelGroup = new THREE.Group();
scene.add(voxelGroup);
const currentSketch = new THREE.Group();
voxelGroup.add(currentSketch);

const gridSize = 1.2;
const placedVoxels = new Map();
const crosshair = new THREE.Mesh(new THREE.BoxGeometry(gridSize, gridSize, gridSize), new THREE.MeshBasicMaterial({ color: 0x00f0ff, wireframe: true, transparent: true, opacity: 0.5 }));
scene.add(crosshair);

scene.add(new THREE.AmbientLight(0xffffff, 0.8));
camera.position.z = 30;

let initialHandDist = null, initialVoxelScale = 1;
let initialMidpoint = null, initialGroupPos = null;
let globalColorIndex = 0, leftPeaceWasActive = false;
const colorPalette = [0x00f0ff, 0xff0000, 0x0000ff, 0x00ff00, 0xffff00, 0xff00ff];
let isBuilding = false, buildTimer = 0, eraseTimer = 0;
let sketchKeys = new Set();
const pinchThresh = 0.04;

function getDist(p1, p2) { return Math.sqrt(Math.pow(p1.x-p2.x,2)+Math.pow(p1.y-p2.y,2)); }

function onResults(results) {
    bioCtx.clearRect(0, 0, bioCanvas.width, bioCanvas.height);
    crosshair.visible = false;
    if (!results.multiHandLandmarks) return;

    let hands = {};
    results.multiHandedness.forEach((hand, idx) => {
        const landmarks = results.multiHandLandmarks[idx];
        drawCyberHand(bioCtx, landmarks);
        hands[hand.label] = landmarks;
    });

    const l = hands['Left'], r = hands['Right'];

    if (l && r) {
        const lFist = l[8].y > l[6].y && l[12].y > l[10].y && l[16].y > l[14].y;
        const rFist = r[8].y > r[6].y && r[12].y > r[10].y && r[16].y > r[14].y;
        const lOpen = l[8].y < l[6].y && l[12].y < l[10].y;
        const rOpen = r[8].y < r[6].y && r[12].y < r[10].y;

        // ZOOM: Two Fists ✊✊
        if (lFist && rFist) {
            const d = getDist(l[9], r[9]);
            if (initialHandDist === null) { initialHandDist = d; initialVoxelScale = voxelGroup.scale.x; }
            else { 
                let s = (d / initialHandDist) * initialVoxelScale;
                voxelGroup.scale.set(s, s, s);
            }
            return;
        } else initialHandDist = null;

        // MOVE: Two Open Palms ✋✋
        if (lOpen && rOpen && !lFist && !rFist) {
            const mid = { x: (l[9].x + r[9].x)/2, y: (l[9].y + r[9].y)/2 };
            if (initialMidpoint === null) { initialMidpoint = mid; initialGroupPos = voxelGroup.position.clone(); }
            else {
                voxelGroup.position.x = initialGroupPos.x + (initialMidpoint.x - mid.x) * 40;
                voxelGroup.position.y = initialGroupPos.y + (initialMidpoint.y - mid.y) * 30;
            }
            return;
        } else initialMidpoint = null;
    }

    if (r) {
        const worldPos = new THREE.Vector3((0.5 - r[8].x) * 30, (0.5 - r[8].y) * 20, 0);
        const localPos = voxelGroup.worldToLocal(worldPos.clone());
        let gx = Math.round(localPos.x / gridSize) * gridSize;
        let gy = Math.round(localPos.y / gridSize) * gridSize;

        const rPinch = getDist(r[4], r[8]) < pinchThresh;
        const lPoint = l && l[8].y < l[6].y && l[12].y > l[10].y; // Left Index Pointing

        if (lPoint && rPinch) { // ERASE
            eraseTimer += 16;
            if (eraseTimer >= 500) {
                const key = `${gx.toFixed(1)},${gy.toFixed(1)},0.0`;
                if (placedVoxels.has(key)) { voxelGroup.remove(placedVoxels.get(key)); placedVoxels.delete(key); }
            }
        } else if (rPinch) { // BUILD
            buildTimer += 16;
            if (buildTimer >= 400) {
                if (!isBuilding) { isBuilding = true; sketchKeys.clear(); }
                addSketchVoxel(gx, gy, 0);
            }
        } else {
            if (isBuilding) commitVoxels();
            isBuilding = false; buildTimer = 0; eraseTimer = 0;
        }

        if (rPinch) {
            crosshair.visible = true;
            crosshair.position.copy(voxelGroup.localToWorld(new THREE.Vector3(gx, gy, 0)));
            crosshair.material.color.set(lPoint ? 0xff0000 : colorPalette[globalColorIndex]);
        }
    }

    if (l) {
        const isPeace = l[8].y < l[6].y && l[12].y < l[10].y && l[16].y > l[14].y;
        if (isPeace && !leftPeaceWasActive) { globalColorIndex = (globalColorIndex + 1) % colorPalette.length; leftPeaceWasActive = true; }
        else if (!isPeace) leftPeaceWasActive = false;
    }
}

function drawCyberHand(ctx, l) {
    ctx.strokeStyle = "#00f0ff"; ctx.lineWidth = 2;
    [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[9,10],[10,11],[11,12],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]].forEach(([a,b])=>{
        ctx.beginPath(); ctx.moveTo(l[a].x*bioCanvas.width, l[a].y*bioCanvas.height); ctx.lineTo(l[b].x*bioCanvas.width, l[b].y*bioCanvas.height); ctx.stroke();
    });
}

function addSketchVoxel(x, y, z) {
    const key = `${x.toFixed(1)},${y.toFixed(1)},${z.toFixed(1)}`;
    if (sketchKeys.has(key) || placedVoxels.has(key)) return;
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(gridSize, gridSize, gridSize), new THREE.MeshBasicMaterial({ color: colorPalette[globalColorIndex], wireframe: true }));
    mesh.position.set(x, y, z);
    currentSketch.add(mesh);
    sketchKeys.add(key);
}

function commitVoxels() {
    while(currentSketch.children.length > 0) {
        const f = currentSketch.children[0];
        const cube = createFinalCube(f.position.x, f.position.y, f.position.z);
        voxelGroup.add(cube);
        placedVoxels.set(`${f.position.x.toFixed(1)},${f.position.y.toFixed(1)},0.0`, cube);
        currentSketch.remove(f);
    }
}

function createFinalCube(x, y, z) {
    const g = new THREE.BoxGeometry(gridSize*0.9, gridSize*0.9, gridSize*0.9);
    const m = new THREE.MeshPhongMaterial({ color: 0x001122, emissive: colorPalette[globalColorIndex], emissiveIntensity: 0.5 });
    const mesh = new THREE.Mesh(g, m);
    mesh.position.set(x, y, z);
    mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(g), new THREE.LineBasicMaterial({ color: colorPalette[globalColorIndex] })));
    return mesh;
}

const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
hands.onResults(onResults);
new Camera(videoElement, { onFrame: async () => { bioCanvas.width = videoElement.videoWidth; bioCanvas.height = videoElement.videoHeight; await hands.send({image: videoElement}); }, width: 1280, height: 720 }).start();
function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
animate();
</script>
</body>
</html>
