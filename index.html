<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Voxel Architect - Ultimate Hybrid v10.0</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #input_video { position: absolute; width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); z-index: 1; opacity: 0.6; }
        #three_canvas { position: absolute; top: 0; left: 0; z-index: 5; pointer-events: none; }
        #biometric_canvas { position: absolute; width: 100vw; height: 100vh; z-index: 10; transform: scaleX(-1); pointer-events: none; }
        #scanner_overlay {
            position: absolute; width: 100vw; height: 100vh; z-index: 2;
            background: linear-gradient(rgba(0, 240, 255, 0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0, 240, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px; pointer-events: none;
        }
        #ui { 
            position: absolute; top: 20px; left: 20px; z-index: 100;
            color: #00f0ff; background: rgba(0,0,0,0.8); padding: 15px;
            border-left: 4px solid #00f0ff; text-shadow: 0 0 5px #00f0ff;
        }
    </style>
</head>
<body>
    <div id="scanner_overlay"></div>
    <div id="ui">
        <div>CORE_SYNC: HYBRID_v10.0</div>
        <div>STATE: <span id="mode" style="color:white">INITIALIZING...</span></div>
        <div>VOXELS: <span id="count" style="color:white">0</span></div>
        <div style="font-size: 9px; color: #00ffcc; margin-top:5px;">R-PINCH: BUILD | L-FIST+R-PINCH: ERASE</div>
        <div style="font-size: 9px; color: #ff00ff;">L-THUMB DOWN: BURST | UP: RESTORE</div>
        <div style="font-size: 9px; color: #ffff00;">L-PEACE: COLOR | R-PEACE: DISCO</div>
    </div>

    <video id="input_video" autoplay playsinline></video>
    <canvas id="three_canvas"></canvas>
    <canvas id="biometric_canvas"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const videoElement = document.getElementById('input_video');
        const bioCanvas = document.getElementById('biometric_canvas');
        const bioCtx = bioCanvas.getContext('2d');
        const modeEl = document.getElementById('mode');
        const countEl = document.getElementById('count');

        // Three.js Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three_canvas'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.position.z = 25;

        const voxelGroup = new THREE.Group();
        scene.add(voxelGroup);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const pointLight = new THREE.PointLight(0x00f0ff, 1);
        pointLight.position.set(10, 10, 10);
        scene.add(pointLight);

        // Global Variables
        const placedVoxels = new Map();
        let gravityEnabled = false;
        let discoMode = false;
        let globalColorIndex = 0;
        const colorPalette = [0x00f0ff, 0xff0055, 0x00ffaa, 0xffcc00, 0xaa00ff];
        let lastColorChange = 0;

        // Draw Biometric Lines
        function drawBiometrics(landmarks) {
            bioCtx.strokeStyle = "rgba(0, 240, 255, 0.6)";
            bioCtx.lineWidth = 2;
            const conn = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[9,10],[10,11],[11,12],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];
            conn.forEach(([a, b]) => {
                bioCtx.beginPath();
                bioCtx.moveTo(landmarks[a].x * bioCanvas.width, landmarks[a].y * bioCanvas.height);
                bioCtx.lineTo(landmarks[b].x * bioCanvas.width, landmarks[b].y * bioCanvas.height);
                bioCtx.stroke();
            });
            landmarks.forEach(p => {
                bioCtx.fillStyle = "#00f0ff";
                bioCtx.beginPath(); bioCtx.arc(p.x * bioCanvas.width, p.y * bioCanvas.height, 3, 0, Math.PI*2); bioCtx.fill();
            });
        }

        function createVoxel(x, y, z) {
            const geo = new THREE.BoxGeometry(1.1, 1.1, 1.1);
            const color = discoMode ? colorPalette[Math.floor(Math.random()*colorPalette.length)] : colorPalette[globalColorIndex];
            const mat = new THREE.MeshPhongMaterial({ color: color, transparent: true, opacity: 0.5, emissive: color, emissiveIntensity: 0.3 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo), new THREE.LineBasicMaterial({ color: color })));
            mesh.position.set(x, y, z);
            mesh.origin = new THREE.Vector3(x, y, z);
            mesh.velocity = new THREE.Vector3(0,0,0);
            return mesh;
        }

        function onResults(results) {
            bioCtx.clearRect(0, 0, bioCanvas.width, bioCanvas.height);
            if (!results.multiHandLandmarks) { modeEl.innerText = "WAITING..."; return; }

            let lHand = null, rHand = null;
            results.multiHandedness.forEach((hand, i) => {
                const lm = results.multiHandLandmarks[i];
                drawBiometrics(lm);
                if(hand.label === 'Left') lHand = lm;
                else rHand = lm;
            });

            // Left Hand: Gravity, Color
            if (lHand) {
                const isFist = lHand[8].y > lHand[6].y && lHand[12].y > lHand[10].y;
                // Thumb Down (Gravity)
                if (isFist && lHand[4].y > lHand[3].y) { gravityEnabled = true; modeEl.innerText = "BURST MODE"; }
                // Thumb Up (Restore)
                if (isFist && lHand[4].y < lHand[3].y) { gravityEnabled = false; modeEl.innerText = "RESTORED"; }
                // Peace Sign (Color Change) - Debounced
                if (lHand[8].y < lHand[6].y && lHand[12].y < lHand[10].y && lHand[16].y > lHand[14].y) {
                    if(Date.now() - lastColorChange > 500) {
                        globalColorIndex = (globalColorIndex + 1) % colorPalette.length;
                        lastColorChange = Date.now();
                    }
                }
            }

            // Right Hand: Build, Erase, Disco
            if (rHand) {
                const isPinch = Math.hypot(rHand[8].x - rHand[4].x, rHand[8].y - rHand[4].y) < 0.05;
                const isPeace = rHand[8].y < rHand[6].y && rHand[12].y < rHand[10].y && rHand[16].y > rHand[14].y;
                
                discoMode = isPeace;
                if(isPeace) modeEl.innerText = "DISCO MODE";

                const gx = Math.round(((0.5 - rHand[8].x) * 35) / 1.2) * 1.2;
                const gy = Math.round(((0.5 - rHand[8].y) * 25) / 1.2) * 1.2;
                const gz = Math.round((-rHand[8].z * 25) / 1.2) * 1.2;
                const key = `${gx},${gy},${gz}`;

                const lFist = lHand && lHand[8].y > lHand[6].y && lHand[12].y > lHand[10].y;

                if (isPinch) {
                    if (lFist) {
                        if (placedVoxels.has(key)) { voxelGroup.remove(placedVoxels.get(key)); placedVoxels.delete(key); modeEl.innerText = "ERASING"; }
                    } else if (!placedVoxels.has(key)) {
                        const v = createVoxel(gx, gy, gz);
                        voxelGroup.add(v); placedVoxels.set(key, v);
                        modeEl.innerText = "BUILDING";
                    }
                }
            }
            countEl.innerText = placedVoxels.size;
        }

        const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.75, minTrackingConfidence: 0.75 });
        hands.onResults(onResults);
        new Camera(videoElement, { onFrame: async () => { 
            bioCanvas.width = videoElement.videoWidth; bioCanvas.height = videoElement.videoHeight;
            await hands.send({image: videoElement}); 
        }}).start();

        function animate() {
            requestAnimationFrame(animate);
            placedVoxels.forEach(v => {
                if (gravityEnabled) { 
                    v.velocity.y -= 0.02; v.position.add(v.velocity); 
                    if(v.position.y < -12) { v.position.y = -12; v.velocity.y *= -0.2; }
                } else { v.position.lerp(v.origin, 0.1); v.velocity.set(0,0,0); }
            });
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
