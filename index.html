<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voxel Architect v16.0 - Master Edition</title>
<style>
    body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    #input_video { position: absolute; width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); z-index: 1; opacity: 0.5; }
    #three_canvas { position: absolute; top: 0; left: 0; z-index: 5; pointer-events: none; }
    #biometric_canvas { position: absolute; width: 100vw; height: 100vh; z-index: 10; transform: scaleX(-1); pointer-events: none; }

    #ui {
        position: absolute; top: 20px; left: 20px; z-index: 100;
        color: #00f0ff; background: rgba(0, 15, 30, 0.8);
        backdrop-filter: blur(10px); padding: 20px; border-radius: 15px;
        border: 1px solid rgba(0, 240, 255, 0.4); min-width: 250px;
    }
    .cmd-group { margin-top: 10px; font-size: 11px; color: #fff; line-height: 1.5; }
    .highlight { color: #00ffcc; font-weight: bold; }
</style>
</head>
<body>
<div id="ui">
    <div style="font-size: 16px; font-weight: bold; text-shadow: 0 0 10px #00f0ff;">ARCHITECT MASTER v16.0</div>
    <div style="font-size: 10px; opacity: 0.7;">VOXELS: <span id="count">0</span></div>
    <hr style="border:0; border-top:1px solid rgba(0,240,255,0.3); margin:10px 0;">
    
    <div class="cmd-group">
        <span class="highlight">👌 RIGHT PINCH:</span> BUILD<br>
        <span class="highlight">✋✋ 2 OPEN PALMS:</span> MOVE ALL<br>
        <span class="highlight">✊✊ 2 FISTS:</span> ZOOM / SCALE<br>
        <span class="highlight">✌️ LEFT PEACE:</span> COLOR SPECTRUM<br>
        <span class="highlight">☝️(L) + 👌(R):</span> ERASE VOXEL<br>
        <hr>
        <span style="color: #ff00ff;">👎 LEFT THUMB DOWN:</span> <b style="color:#ff3333;">EXPLODE (GRAVITY)</b><br>
        <span style="color: #00ff88;">👍 LEFT THUMB UP:</span> <b style="color:#00ff88;">RESTORE STRUCTURE</b>
    </div>
</div>

<video id="input_video" autoplay playsinline></video>
<canvas id="three_canvas"></canvas>
<canvas id="biometric_canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const videoElement = document.getElementById('input_video');
const bioCanvas = document.getElementById('biometric_canvas');
const bioCtx = bioCanvas.getContext('2d');
const countEl = document.getElementById('count');

// --- THREE.JS ENGINE ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three_canvas'), antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);

const voxelGroup = new THREE.Group();
scene.add(voxelGroup);
const currentSketch = new THREE.Group();
voxelGroup.add(currentSketch);

scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const sun = new THREE.PointLight(0xffffff, 1.2);
sun.position.set(20, 30, 20);
scene.add(sun);
camera.position.z = 45;

// --- STATE & PHYSICS ---
let gravityEnabled = false;
let smoothPos = new THREE.Vector3();
let initialHandDist = null, initialVoxelScale = 1;
let initialMidpoint = null, initialGroupPos = new THREE.Vector3();
let globalColorIndex = 0, leftPeaceActive = false;
const colorPalette = [0x00f0ff, 0x00ffcc, 0xff0055, 0x9900ff, 0xffff00, 0xff8800];
const gridSize = 1.2;
const placedVoxels = new Map();
const crosshair = new THREE.Mesh(new THREE.BoxGeometry(gridSize, gridSize, gridSize), new THREE.MeshBasicMaterial({ color: 0x00f0ff, wireframe: true }));
scene.add(crosshair);

function getDist(p1, p2) { return Math.sqrt(Math.pow(p1.x-p2.x,2)+Math.pow(p1.y-p2.y,2)); }

function onResults(results) {
    bioCtx.clearRect(0, 0, bioCanvas.width, bioCanvas.height);
    crosshair.visible = false;
    if (!results.multiHandLandmarks) return;

    let hands = {};
    results.multiHandedness.forEach((hand, idx) => {
        const landmarks = results.multiHandLandmarks[idx];
        drawHandHUD(bioCtx, landmarks);
        hands[hand.label] = landmarks;
    });

    const l = hands['Left'], r = hands['Right'];

    // 1. GLOBAL CONTROLS (ZOOM & MOVE)
    if (l && r) {
        const lFist = l[8].y > l[6].y && l[12].y > l[10].y && l[16].y > l[14].y;
        const rFist = r[8].y > r[6].y && r[12].y > r[10].y && r[16].y > r[14].y;
        const lOpen = l[8].y < l[6].y && l[12].y < l[10].y;
        const rOpen = r[8].y < r[6].y && r[12].y < r[10].y;

        if (lFist && rFist) {
            const d = getDist(l[9], r[9]);
            if (initialHandDist === null) { initialHandDist = d; initialVoxelScale = voxelGroup.scale.x; }
            else { 
                let s = (d / initialHandDist) * initialVoxelScale;
                voxelGroup.scale.lerp(new THREE.Vector3(s, s, s), 0.2);
            }
            return;
        } else initialHandDist = null;

        if (lOpen && rOpen && !lFist && !rFist) {
            const mid = { x: (l[9].x + r[9].x)/2, y: (l[9].y + r[9].y)/2 };
            if (initialMidpoint === null) { initialMidpoint = mid; initialGroupPos.copy(voxelGroup.position); }
            else {
                let tx = initialGroupPos.x + (initialMidpoint.x - mid.x) * 50;
                let ty = initialGroupPos.y + (initialMidpoint.y - mid.y) * 40;
                voxelGroup.position.lerp(new THREE.Vector3(tx, ty, 0), 0.2);
            }
            return;
        } else initialMidpoint = null;
    }

    // 2. LEFT HAND: PHYSICS & COLOR
    if (l) {
        const curled = l[8].y > l[6].y && l[12].y > l[10].y;
        const isPeace = l[8].y < l[6].y && l[12].y < l[10].y && l[16].y > l[14].y;
        
        // Color Change
        if (isPeace && !leftPeaceActive) { globalColorIndex = (globalColorIndex + 1) % colorPalette.length; leftPeaceActive = true; }
        else if (!isPeace) leftPeaceActive = false;

        // Gravity (Thumb Down) 👎
        if (l[4].y > l[3].y && curled) { if(!gravityEnabled) explodeStructure(); gravityEnabled = true; }
        // Restore (Thumb Up) 👍
        if (l[4].y < l[3].y && curled) gravityEnabled = false;
    }

    // 3. RIGHT HAND: BUILD & ERASE
    if (r) {
        const targetPos = new THREE.Vector3((0.5 - r[8].x) * 45, (0.5 - r[8].y) * 35, 0);
        smoothPos.lerp(targetPos, 0.3);
        const localPos = voxelGroup.worldToLocal(smoothPos.clone());
        let gx = Math.round(localPos.x / gridSize) * gridSize;
        let gy = Math.round(localPos.y / gridSize) * gridSize;

        const rPinch = getDist(r[4], r[8]) < 0.04;
        const lPoint = l && l[8].y < l[6].y && l[12].y > l[10].y;

        if (lPoint && rPinch) { // ERASE
            const key = `${gx.toFixed(1)},${gy.toFixed(1)},0.0`;
            if (placedVoxels.has(key)) { voxelGroup.remove(placedVoxels.get(key)); placedVoxels.delete(key); }
        } else if (rPinch) { // BUILD
            addSketchVoxel(gx, gy, 0);
        } else commitVoxels();

        if (rPinch || lPoint) {
            crosshair.visible = true;
            crosshair.position.copy(voxelGroup.localToWorld(new THREE.Vector3(gx, gy, 0)));
            crosshair.material.color.set(lPoint ? 0xff3333 : colorPalette[globalColorIndex]);
        }
    }
    countEl.innerText = placedVoxels.size;
}

// --- UTILS ---
function explodeStructure() {
    placedVoxels.forEach(v => {
        v.velocity = new THREE.Vector3((Math.random()-0.5)*0.8, (Math.random())*0.6, (Math.random()-0.5)*0.8);
    });
}

function drawHandHUD(ctx, landmarks) {
    ctx.strokeStyle = "rgba(0, 240, 255, 0.4)"; ctx.lineWidth = 2;
    [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[9,10],[10,11],[11,12],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]].forEach(([a,b])=>{
        ctx.beginPath(); ctx.moveTo(landmarks[a].x*bioCanvas.width, landmarks[a].y*bioCanvas.height); ctx.lineTo(landmarks[b].x*bioCanvas.width, landmarks[b].y*bioCanvas.height); ctx.stroke();
    });
}

function addSketchVoxel(x, y, z) {
    const key = `${x.toFixed(1)},${y.toFixed(1)},${z.toFixed(1)}`;
    if (placedVoxels.has(key)) return;
    const mesh = createFinalCube(x, y, z);
    voxelGroup.add(mesh);
    placedVoxels.set(key, mesh);
}

function commitVoxels() {} // Built-in instant placement for stability

function createFinalCube(x, y, z) {
    const g = new THREE.BoxGeometry(gridSize*0.9, gridSize*0.9, gridSize*0.9);
    const m = new THREE.MeshPhongMaterial({ color: 0x001122, emissive: colorPalette[globalColorIndex], emissiveIntensity: 0.6 });
    const mesh = new THREE.Mesh(g, m);
    mesh.position.set(x, y, z);
    mesh.origin = new THREE.Vector3(x, y, z);
    mesh.velocity = new THREE.Vector3(0,0,0);
    mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(g), new THREE.LineBasicMaterial({ color: colorPalette[globalColorIndex] })));
    return mesh;
}

const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });
hands.onResults(onResults);
new Camera(videoElement, { onFrame: async () => { bioCanvas.width = videoElement.videoWidth; bioCanvas.height = videoElement.videoHeight; await hands.send({image: videoElement}); }, width: 1280, height: 720 }).start();

function animate() {
    requestAnimationFrame(animate);
    placedVoxels.forEach(v => {
        if (gravityEnabled) {
            v.velocity.y -= 0.02; // Gravity force
            v.position.add(v.velocity);
            if (v.position.y < -20) { v.position.y = -20; v.velocity.y *= -0.3; }
        } else {
            v.position.lerp(v.origin, 0.15); // Smooth Restore
            v.velocity.set(0,0,0);
        }
    });
    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
