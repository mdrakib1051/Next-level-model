<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Voxel Architect v5.1 - Sync Update</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #input_video { position: absolute; width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); z-index: 1; }
        #three_canvas { position: absolute; top: 0; left: 0; z-index: 5; pointer-events: none; }
        #biometric_canvas { position: absolute; width: 100vw; height: 100vh; z-index: 10; transform: scaleX(-1); pointer-events: none; }
        #ui { 
            position: absolute; top: 20px; left: 20px; z-index: 100;
            color: #00f0ff; font-weight: bold; font-size: 14px;
            text-shadow: 0 0 10px #00f0ff; border-left: 3px solid #00f0ff; padding-left: 15px;
            background: rgba(0,0,0,0.6); padding: 15px; border-radius: 0 10px 10px 0;
        }
        .stat-val { color: #fff; }
    </style>
</head>
<body>
    <div id="ui">
        <div>BIO_SYNC: ARCHITECT_OS_v5.1</div>
        <div>STATE: <span id="mode" class="stat-val">SCANNING</span></div>
        <div>VOXELS: <span id="count" class="stat-val">0</span></div>
        <div style="font-size: 10px; margin-top: 5px; color: #ff3333;">L-FIST + R-PINCH: ERASE</div>
        <div style="font-size: 10px; color: #00ff00;">R-PINCH: BUILD | L-FIST: MOVE</div>
    </div>

    <video id="input_video" autoplay playsinline></video>
    <canvas id="three_canvas"></canvas>
    <canvas id="biometric_canvas"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const videoElement = document.getElementById('input_video');
        const bioCanvas = document.getElementById('biometric_canvas');
        const bioCtx = bioCanvas.getContext('2d');
        const modeEl = document.getElementById('mode');
        const countEl = document.getElementById('count');

        // Three.js Scene Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three_canvas'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const voxelGroup = new THREE.Group();
        scene.add(voxelGroup);

        const gridSize = 1.2;
        const placedVoxels = new Map();

        // Crosshair/Guide Box
        const crosshair = new THREE.Mesh(
            new THREE.BoxGeometry(gridSize, gridSize, gridSize),
            new THREE.MeshBasicMaterial({ color: 0x00f0ff, wireframe: true, transparent: true, opacity: 0.5 })
        );
        scene.add(crosshair);

        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const sun = new THREE.DirectionalLight(0x00f0ff, 1.0);
        sun.position.set(5, 10, 5);
        scene.add(sun);
        camera.position.z = 22;

        let smoothedLandmarks = { Left: [], Right: [] };
        const pinchThreshold = 0.04;

        function drawHUDCircle(ctx, x, y, progress, color) {
            ctx.beginPath();
            ctx.arc(x, y, 30, -Math.PI/2, (-Math.PI/2) + (Math.PI * 2 * progress));
            ctx.lineWidth = 4; ctx.strokeStyle = color; ctx.stroke();
        }

        function onResults(results) {
            bioCtx.clearRect(0, 0, bioCanvas.width, bioCanvas.height);
            crosshair.visible = false;
            if (!results.multiHandLandmarks) return;

            let lHand = null, rHand = null;
            results.multiHandedness.forEach((hand, idx) => {
                const landmarks = results.multiHandLandmarks[idx];
                if(hand.label === 'Left') lHand = landmarks;
                if(hand.label === 'Right') rHand = landmarks;
            });

            if (rHand) {
                const indexTip = rHand[8];
                const thumbTip = rHand[4];
                const isPinching = Math.hypot(indexTip.x - thumbTip.x, indexTip.y - thumbTip.y) < pinchThreshold;
                
                const worldX = (0.5 - indexTip.x) * 30;
                const worldY = (0.5 - indexTip.y) * 20;
                const worldZ = -indexTip.z * 20;

                const gx = Math.round(worldX / gridSize) * gridSize;
                const gy = Math.round(worldY / gridSize) * gridSize;
                const gz = Math.round(worldZ / gridSize) * gridSize;

                crosshair.visible = true;
                crosshair.position.set(gx, gy, gz);

                if (isPinching) {
                    const key = `${gx},${gy},${gz}`;
                    if (!placedVoxels.has(key)) {
                        const cube = new THREE.Mesh(
                            new THREE.BoxGeometry(gridSize*0.95, gridSize*0.95, gridSize*0.95),
                            new THREE.MeshPhongMaterial({ color: 0x001122, emissive: 0x00f0ff, emissiveIntensity: 0.5, transparent: true, opacity: 0.9 })
                        );
                        cube.position.set(gx, gy, gz);
                        voxelGroup.add(cube);
                        placedVoxels.set(key, cube);
                        countEl.innerText = placedVoxels.size;
                    }
                    drawHUDCircle(bioCtx, indexTip.x * bioCanvas.width, indexTip.y * bioCanvas.height, 1, "#00ffcc");
                    modeEl.innerText = "BUILDING";
                } else {
                    modeEl.innerText = "NAVIGATING";
                }
            }
        }

        const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.8 });
        hands.onResults(onResults);
        new Camera(videoElement, { onFrame: async () => { 
            bioCanvas.width = videoElement.videoWidth; bioCanvas.height = videoElement.videoHeight;
            await hands.send({image: videoElement}); 
        }}).start();

        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
